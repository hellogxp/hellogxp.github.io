<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="780" height="400" viewBox="0 0 780 400" role="img" aria-labelledby="title desc">
  <title id="title">Regression memory lifecycle</title>
  <desc id="desc">Production evidence is triaged, minimized, replayed, promoted into a durable case, and monitored for recurrence.</desc>
  <defs>
    <style>
      text { font-family: "Segoe UI", system-ui, sans-serif; fill: #2c3e50; }
      .heading { font-size: 18px; font-weight: 650; }
      .label { font-size: 12px; font-weight: 650; }
      .detail { font-size: 10px; fill: #66717d; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse" overflow="visible">
      <path d="M1 1 L9 5 L1 9 Z" fill="#61717f"/>
    </marker>
  </defs>
  <rect width="780" height="400" fill="#ffffff"/>
  <text x="390" y="32" class="heading" text-anchor="middle">From incident artifact to durable engineering memory</text>

  <g transform="translate(28,78)">
    <rect width="110" height="64" rx="8" fill="#f8d8d8" stroke="#d9a2a2"/>
    <text x="55" y="27" class="label" text-anchor="middle">Detect</text>
    <text x="55" y="46" class="detail" text-anchor="middle">trace / complaint</text>
  </g>
  <g transform="translate(180,78)">
    <rect width="110" height="64" rx="8" fill="#fce5bd" stroke="#d9b36b"/>
    <text x="55" y="27" class="label" text-anchor="middle">Triage</text>
    <text x="55" y="46" class="detail" text-anchor="middle">defect or noise?</text>
  </g>
  <g transform="translate(332,78)">
    <rect width="110" height="64" rx="8" fill="#dceaf5" stroke="#9ab6cb"/>
    <text x="55" y="27" class="label" text-anchor="middle">Minimize</text>
    <text x="55" y="46" class="detail" text-anchor="middle">failing transition</text>
  </g>
  <g transform="translate(484,78)">
    <rect width="110" height="64" rx="8" fill="#dceaf5" stroke="#9ab6cb"/>
    <text x="55" y="27" class="label" text-anchor="middle">Replay</text>
    <text x="55" y="46" class="detail" text-anchor="middle">prove recurrence</text>
  </g>
  <g transform="translate(636,78)">
    <rect width="110" height="64" rx="8" fill="#d9efdf" stroke="#92c5a0"/>
    <text x="55" y="27" class="label" text-anchor="middle">Promote</text>
    <text x="55" y="46" class="detail" text-anchor="middle">versioned case</text>
  </g>

  <line x1="144" y1="110" x2="174" y2="110" stroke="#61717f" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="296" y1="110" x2="326" y2="110" stroke="#61717f" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="448" y1="110" x2="478" y2="110" stroke="#61717f" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="600" y1="110" x2="630" y2="110" stroke="#61717f" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="165" y="190" width="140" height="58" rx="8" fill="#f5f7f9" stroke="#bdc3c7"/>
  <text x="235" y="214" class="label" text-anchor="middle">Do not promote</text>
  <text x="235" y="233" class="detail" text-anchor="middle">noise / grader error</text>
  <line x1="235" y1="148" x2="235" y2="184" stroke="#c38a8a" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrow)"/>

  <rect x="365" y="192" width="340" height="92" rx="8" fill="#fef9e7" stroke="#d9c98a"/>
  <text x="535" y="220" class="label" text-anchor="middle">Regression memory</text>
  <text x="535" y="244" class="detail" text-anchor="middle">fixture + invariant + graders + lineage</text>
  <text x="535" y="264" class="detail" text-anchor="middle">owner + retention + release authority</text>
  <path d="M691 148 V166 H535 V186" fill="none" stroke="#61717f" stroke-width="2" marker-end="url(#arrow)"/>

  <path d="M535 290 V320 H83 V148" fill="none" stroke="#95a5a6" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow)"/>
  <text x="306" y="344" class="detail" text-anchor="middle">online recurrence creates new evidence</text>
  <text x="390" y="378" class="detail" text-anchor="middle">A fix is closed only when the system can detect the same failure again.</text>
</svg>
