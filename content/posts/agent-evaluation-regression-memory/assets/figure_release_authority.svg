<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="780" height="430" viewBox="0 0 780 430" role="img" aria-labelledby="title desc">
  <title id="title">Release authority decision matrix</title>
  <desc id="desc">Release action depends separately on measurement defensibility and the consequence or irreversibility of the evaluated property.</desc>
  <defs>
    <style>
      text { font-family: "Segoe UI", system-ui, sans-serif; fill: #2c3e50; }
      .heading { font-size: 18px; font-weight: 650; }
      .label { font-size: 14px; font-weight: 650; }
      .detail { font-size: 10px; fill: #66717d; }
      .axis { font-size: 11px; font-weight: 600; fill: #66717d; }
      .hint { font-size: 9px; fill: #7b858e; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse" overflow="visible">
      <path d="M1 1 L9 5 L1 9 Z" fill="#61717f"/>
    </marker>
  </defs>
  <rect width="780" height="430" fill="#ffffff"/>
  <text x="390" y="30" class="heading" text-anchor="middle">Authority depends on evidence and consequence</text>

  <rect x="145" y="65" width="275" height="145" fill="#f7e5e5" stroke="#d9a2a2"/>
  <rect x="420" y="65" width="275" height="145" fill="#f8d8d8" stroke="#d9a2a2"/>
  <rect x="145" y="210" width="275" height="145" fill="#f5f7f9" stroke="#bdc3c7"/>
  <rect x="420" y="210" width="275" height="145" fill="#dceaf5" stroke="#9ab6cb"/>

  <text x="282" y="103" class="label" text-anchor="middle">Human review</text>
  <text x="282" y="128" class="detail" text-anchor="middle">abstain from automation</text>
  <text x="282" y="148" class="detail" text-anchor="middle">collect labels and state evidence</text>
  <text x="282" y="168" class="detail" text-anchor="middle">no silent pass for high-impact uncertainty</text>

  <text x="557" y="103" class="label" text-anchor="middle">Block or gated review</text>
  <text x="557" y="128" class="detail" text-anchor="middle">deterministic invariant -&gt; hard block</text>
  <text x="557" y="148" class="detail" text-anchor="middle">stochastic property -&gt; statistical gate</text>
  <text x="557" y="168" class="detail" text-anchor="middle">inconclusive -&gt; expert adjudication</text>

  <text x="282" y="248" class="label" text-anchor="middle">Shadow / warn</text>
  <text x="282" y="273" class="detail" text-anchor="middle">observe proposed decisions</text>
  <text x="282" y="293" class="detail" text-anchor="middle">measure false-pass and false-fail rates</text>
  <text x="282" y="313" class="detail" text-anchor="middle">no deployment authority yet</text>

  <text x="557" y="248" class="label" text-anchor="middle">Canary / automated policy</text>
  <text x="557" y="273" class="detail" text-anchor="middle">calibrated quality or SLO signal</text>
  <text x="557" y="293" class="detail" text-anchor="middle">limited exposure and rollback</text>
  <text x="557" y="313" class="detail" text-anchor="middle">authority bounded by reversibility</text>

  <line x1="145" y1="370" x2="695" y2="370" stroke="#61717f" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="420" y="407" class="axis" text-anchor="middle">Measurement defensibility</text>
  <text x="150" y="390" class="hint">low</text>
  <text x="680" y="390" class="hint" text-anchor="end">high</text>

  <line x1="128" y1="355" x2="128" y2="65" stroke="#61717f" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="66" y="210" class="axis" text-anchor="middle" transform="rotate(-90 66 210)">Consequence / irreversibility</text>
  <text x="112" y="350" class="hint" text-anchor="end">low</text>
  <text x="112" y="78" class="hint" text-anchor="end">high</text>
</svg>
