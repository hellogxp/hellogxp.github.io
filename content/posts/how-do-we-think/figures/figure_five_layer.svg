<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="760" height="480" viewBox="0 0 760 480">
  <defs>
    <style>
      text { font-family: "Segoe UI", system-ui, -apple-system, sans-serif; }
      .title { font-size: 20px; font-weight: 600; fill: #1b1b1f; }
      .layer-num { font-size: 26px; font-weight: 700; fill: #ffffff; }
      .layer-name { font-size: 16px; font-weight: 600; fill: #1b1b1f; }
      .layer-desc { font-size: 12px; fill: #555; }
      .role-h { font-size: 11px; fill: #e67700; font-weight: 500; }
      .role-a { font-size: 11px; fill: #1971c2; font-weight: 500; }
      .bracket { font-size: 12px; fill: #868e96; font-style: italic; }
    </style>
    <marker id="a5" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1b1b1f"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>

  <text x="380" y="32" text-anchor="middle" class="title">Five-Layer Cognitive Division Model</text>

  <!-- Layer 1: Problem Framing (Human-only) -->
  <circle cx="80" cy="90" r="18" fill="#e67700"/>
  <text x="80" y="96" text-anchor="middle" class="layer-num">1</text>
  <rect x="115" y="65" width="560" height="50" rx="6" fill="#fff9db" stroke="#1b1b1f" stroke-width="2"/>
  <text x="130" y="88" class="layer-name">Problem Framing</text>
  <text x="130" y="104" class="layer-desc">Identify what matters, frame the question</text>
  <text x="530" y="88" class="role-h">Human-only</text>
  <text x="530" y="104" class="role-a">AI: none</text>

  <!-- Layer 2: Specification (Human-led) -->
  <circle cx="80" cy="165" r="18" fill="#e67700"/>
  <text x="80" y="171" text-anchor="middle" class="layer-num">2</text>
  <rect x="115" y="140" width="560" height="50" rx="6" fill="#fff9db" stroke="#1b1b1f" stroke-width="1.5"/>
  <text x="130" y="163" class="layer-name">Specification</text>
  <text x="130" y="179" class="layer-desc">Translate framing into verifiable requirements</text>
  <text x="530" y="163" class="role-h">Human-led</text>
  <text x="530" y="179" class="role-a">AI: draft, flag ambiguity</text>

  <!-- Layer 3: Context Engineering (Collaborative) -->
  <circle cx="80" cy="240" r="18" fill="#2f9e44"/>
  <text x="80" y="246" text-anchor="middle" class="layer-num">3</text>
  <rect x="115" y="215" width="560" height="50" rx="6" fill="#d3f9d8" stroke="#1b1b1f" stroke-width="1.5"/>
  <text x="130" y="238" class="layer-name">Context Engineering</text>
  <text x="130" y="254" class="layer-desc">Design information flows and retrieval strategies</text>
  <text x="530" y="238" class="role-h">Human-AI collaborative</text>
  <text x="530" y="254" class="role-a">AI: retrieval, compress</text>

  <!-- Layer 4: Execution (AI-led) -->
  <circle cx="80" cy="315" r="18" fill="#1971c2"/>
  <text x="80" y="321" text-anchor="middle" class="layer-num">4</text>
  <rect x="115" y="290" width="560" height="50" rx="6" fill="#d0ebff" stroke="#1b1b1f" stroke-width="1.5"/>
  <text x="130" y="313" class="layer-name">Execution</text>
  <text x="130" y="329" class="layer-desc">Implementation, generation, computation</text>
  <text x="530" y="313" class="role-h">Human-monitored</text>
  <text x="530" y="329" class="role-a">AI-led</text>

  <!-- Layer 5: Judgment (Human-only) -->
  <circle cx="80" cy="390" r="18" fill="#e67700"/>
  <text x="80" y="396" text-anchor="middle" class="layer-num">5</text>
  <rect x="115" y="365" width="560" height="50" rx="6" fill="#fff9db" stroke="#1b1b1f" stroke-width="2"/>
  <text x="130" y="388" class="layer-name">Judgment &amp; Verification</text>
  <text x="130" y="404" class="layer-desc">Quality assessment, ethical review, final sign-off</text>
  <text x="530" y="388" class="role-h">Human-only</text>
  <text x="530" y="404" class="role-a">AI: testing, linting</text>

  <!-- Vertical arrows -->
  <line x1="80" y1="110" x2="80" y2="145" stroke="#1b1b1f" stroke-width="1.5" marker-end="url(#a5)"/>
  <line x1="80" y1="185" x2="80" y2="220" stroke="#1b1b1f" stroke-width="1.5" marker-end="url(#a5)"/>
  <line x1="80" y1="260" x2="80" y2="295" stroke="#1b1b1f" stroke-width="1.5" marker-end="url(#a5)"/>
  <line x1="80" y1="335" x2="80" y2="370" stroke="#1b1b1f" stroke-width="1.5" marker-end="url(#a5)"/>

  <!-- Side bracket annotations -->
  <line x1="700" y1="70" x2="710" y2="70" stroke="#868e96" stroke-width="1"/>
  <line x1="710" y1="70" x2="710" y2="115" stroke="#868e96" stroke-width="1"/>
  <line x1="700" y1="115" x2="710" y2="115" stroke="#868e96" stroke-width="1"/>
  <text x="718" y="97" class="bracket">Bookend</text>

  <line x1="700" y1="365" x2="710" y2="365" stroke="#868e96" stroke-width="1"/>
  <line x1="710" y1="365" x2="710" y2="415" stroke="#868e96" stroke-width="1"/>
  <line x1="700" y1="415" x2="710" y2="415" stroke="#868e96" stroke-width="1"/>
  <text x="718" y="395" class="bracket">Bookend</text>

  <!-- Legend -->
  <rect x="200" y="440" width="14" height="10" rx="2" fill="#fff9db" stroke="#1b1b1f" stroke-width="1"/>
  <text x="220" y="449" font-size="11" fill="#1b1b1f">Human-led</text>
  <rect x="310" y="440" width="14" height="10" rx="2" fill="#d3f9d8" stroke="#1b1b1f" stroke-width="1"/>
  <text x="330" y="449" font-size="11" fill="#1b1b1f">Collaborative</text>
  <rect x="420" y="440" width="14" height="10" rx="2" fill="#d0ebff" stroke="#1b1b1f" stroke-width="1"/>
  <text x="440" y="449" font-size="11" fill="#1b1b1f">AI-led</text>
</svg>
