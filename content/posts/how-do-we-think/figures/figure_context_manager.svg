<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="780" height="440" viewBox="0 0 780 440">
  <defs>
    <style>
      text { font-family: "Segoe UI", system-ui, -apple-system, sans-serif; }
      .title { font-size: 20px; font-weight: 600; fill: #1b1b1f; }
      .agent-label { font-size: 14px; font-weight: 500; fill: #1b1b1f; }
      .human-label { font-size: 16px; font-weight: 700; fill: #1b1b1f; }
      .resp { font-size: 11px; fill: #555; }
      .num { font-size: 11px; font-weight: 700; fill: #868e96; }
    </style>
    <marker id="a2" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#868e96"/>
    </marker>
    <marker id="a3" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#c92a2a"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>

  <text x="390" y="30" text-anchor="middle" class="title">Human as Context Manager in Multi-Agent Systems</text>

  <!-- Central Human node -->
  <rect x="295" y="140" width="190" height="70" rx="8" fill="#fff9db" stroke="#1b1b1f" stroke-width="2.5"/>
  <text x="390" y="170" text-anchor="middle" class="human-label">Context Manager</text>
  <text x="390" y="188" text-anchor="middle" font-size="12" fill="#868e96">(Human)</text>

  <!-- Agent A (top-left) -->
  <rect x="60" y="60" width="140" height="50" rx="6" fill="#d0ebff" stroke="#1b1b1f" stroke-width="1.5"/>
  <text x="130" y="90" text-anchor="middle" class="agent-label">Agent A</text>

  <!-- Agent B (top-right) -->
  <rect x="580" y="60" width="140" height="50" rx="6" fill="#d0ebff" stroke="#1b1b1f" stroke-width="1.5"/>
  <text x="650" y="90" text-anchor="middle" class="agent-label">Agent B</text>

  <!-- Agent C (bottom-left) -->
  <rect x="60" y="240" width="140" height="50" rx="6" fill="#d0ebff" stroke="#1b1b1f" stroke-width="1.5"/>
  <text x="130" y="270" text-anchor="middle" class="agent-label">Agent C</text>

  <!-- Agent D (bottom-right) -->
  <rect x="580" y="240" width="140" height="50" rx="6" fill="#d0ebff" stroke="#1b1b1f" stroke-width="1.5"/>
  <text x="650" y="270" text-anchor="middle" class="agent-label">Agent D</text>

  <!-- Connections: Human <-> Agents (solid gray) -->
  <line x1="202" y1="90" x2="293" y2="155" stroke="#868e96" stroke-width="1.5" marker-end="url(#a2)"/>
  <line x1="487" y1="155" x2="578" y2="90" stroke="#868e96" stroke-width="1.5" marker-end="url(#a2)"/>
  <line x1="202" y1="260" x2="293" y2="195" stroke="#868e96" stroke-width="1.5" marker-end="url(#a2)"/>
  <line x1="487" y1="195" x2="578" y2="260" stroke="#868e96" stroke-width="1.5" marker-end="url(#a2)"/>

  <!-- Error propagation: Agent A -> Agent B (dashed red) -->
  <line x1="202" y1="78" x2="578" y2="78" stroke="#c92a2a" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a3)"/>
  <text x="390" y="70" text-anchor="middle" font-size="10" fill="#c92a2a">error propagation risk</text>

  <!-- Five responsibilities list -->
  <rect x="155" y="310" width="470" height="115" rx="8" fill="#f8f9fa" stroke="#e5e5e5" stroke-width="1"/>

  <text x="175" y="333" class="num">1</text>
  <text x="192" y="333" class="resp">Context Initialization — define goals, roles, shared knowledge</text>

  <text x="175" y="353" class="num">2</text>
  <text x="192" y="353" class="resp">Information Synchronization — maintain version consistency</text>

  <text x="175" y="373" class="num">3</text>
  <text x="192" y="373" class="resp">Conflict Mediation — arbitrate contradictory outputs</text>

  <text x="175" y="393" class="num">4</text>
  <text x="192" y="393" class="resp">Quality Gatekeeping — review handoff artifacts at boundaries</text>

  <text x="175" y="413" class="num">5</text>
  <text x="192" y="413" class="resp">Dynamic Adjustment — reconfigure agents mid-task</text>
</svg>
