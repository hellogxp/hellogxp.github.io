<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="360" viewBox="0 0 800 360">
  <defs>
    <style>
      text { font-family: "Segoe UI", system-ui, -apple-system, sans-serif; }
      .title { font-size: 20px; font-weight: 600; fill: #1b1b1f; }
      .box-title { font-size: 15px; font-weight: 600; fill: #1b1b1f; }
      .box-desc { font-size: 11px; fill: #555; }
      .role { font-size: 10px; fill: #868e96; font-style: italic; }
    </style>
    <marker id="ar" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1b1b1f"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>

  <text x="400" y="32" text-anchor="middle" class="title">Context Engineering: Four Core Strategies</text>
  <text x="400" y="52" text-anchor="middle" font-size="12" fill="#868e96" font-style="italic">From "what to say" to "what the model sees"</text>

  <!-- Central pipeline arrow -->
  <line x1="80" y1="170" x2="720" y2="170" stroke="#ccc" stroke-width="2"/>
  <text x="50" y="175" font-size="12" fill="#868e96">Input</text>
  <polygon points="720,165 735,170 720,175" fill="#ccc"/>
  <text x="740" y="175" font-size="12" fill="#868e96">Model</text>

  <!-- Box 1: Write -->
  <rect x="85" y="85" width="140" height="120" rx="6" fill="#fff9db" stroke="#1b1b1f" stroke-width="1.5"/>
  <text x="155" y="108" text-anchor="middle" class="box-title">Write</text>
  <line x1="105" y1="114" x2="205" y2="114" stroke="#e5e5e5" stroke-width="1"/>
  <text x="155" y="132" text-anchor="middle" class="box-desc">Curate information</text>
  <text x="155" y="147" text-anchor="middle" class="box-desc">sources that matter</text>
  <text x="155" y="175" text-anchor="middle" class="role">Human: curation decision</text>
  <text x="155" y="190" text-anchor="middle" class="role">AI: text generation</text>

  <!-- Box 2: Select -->
  <rect x="245" y="85" width="140" height="120" rx="6" fill="#d3f9d8" stroke="#1b1b1f" stroke-width="1.5"/>
  <text x="315" y="108" text-anchor="middle" class="box-title">Select</text>
  <line x1="265" y1="114" x2="365" y2="114" stroke="#e5e5e5" stroke-width="1"/>
  <text x="315" y="132" text-anchor="middle" class="box-desc">Design retrieval</text>
  <text x="315" y="147" text-anchor="middle" class="box-desc">strategies &amp; filters</text>
  <text x="315" y="175" text-anchor="middle" class="role">Human: schema design</text>
  <text x="315" y="190" text-anchor="middle" class="role">AI: retrieval execution</text>

  <!-- Box 3: Compress -->
  <rect x="405" y="85" width="140" height="120" rx="6" fill="#d0ebff" stroke="#1b1b1f" stroke-width="1.5"/>
  <text x="475" y="108" text-anchor="middle" class="box-title">Compress</text>
  <line x1="425" y1="114" x2="525" y2="114" stroke="#e5e5e5" stroke-width="1"/>
  <text x="475" y="132" text-anchor="middle" class="box-desc">Define lossy vs.</text>
  <text x="475" y="147" text-anchor="middle" class="box-desc">verbatim boundaries</text>
  <text x="475" y="175" text-anchor="middle" class="role">Human: loss function</text>
  <text x="475" y="190" text-anchor="middle" class="role">AI: summarization</text>

  <!-- Box 4: Isolate -->
  <rect x="565" y="85" width="140" height="120" rx="6" fill="#e5dbff" stroke="#1b1b1f" stroke-width="1.5"/>
  <text x="635" y="108" text-anchor="middle" class="box-title">Isolate</text>
  <line x1="585" y1="114" x2="685" y2="114" stroke="#e5e5e5" stroke-width="1"/>
  <text x="635" y="132" text-anchor="middle" class="box-desc">Architect information</text>
  <text x="635" y="147" text-anchor="middle" class="box-desc">boundaries</text>
  <text x="635" y="175" text-anchor="middle" class="role">Human: threat model</text>
  <text x="635" y="190" text-anchor="middle" class="role">AI: enforcement</text>

  <!-- Flow arrows between boxes -->
  <line x1="227" y1="145" x2="243" y2="145" stroke="#1b1b1f" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="387" y1="145" x2="403" y2="145" stroke="#1b1b1f" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="547" y1="145" x2="563" y2="145" stroke="#1b1b1f" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Bottom: paradigm shift -->
  <rect x="140" y="240" width="240" height="50" rx="6" fill="#f1f3f5" stroke="#868e96" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="260" y="262" text-anchor="middle" font-size="13" fill="#868e96">Prompt Engineering</text>
  <text x="260" y="278" text-anchor="middle" font-size="11" fill="#868e96">"What to say" (2020–2024)</text>

  <line x1="382" y1="265" x2="418" y2="265" stroke="#1b1b1f" stroke-width="1.5" marker-end="url(#ar)"/>

  <rect x="420" y="240" width="240" height="50" rx="6" fill="#fff9db" stroke="#1b1b1f" stroke-width="1.5"/>
  <text x="540" y="262" text-anchor="middle" font-size="13" fill="#1b1b1f" font-weight="600">Context Engineering</text>
  <text x="540" y="278" text-anchor="middle" font-size="11" fill="#555">"What the model sees" (2025+)</text>

  <!-- Source -->
  <text x="400" y="330" text-anchor="middle" font-size="11" fill="#868e96">Based on Anthropic (2025), "Building effective agents"</text>
</svg>
