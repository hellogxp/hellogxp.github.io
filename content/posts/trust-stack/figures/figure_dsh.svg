<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="780" height="480" viewBox="0 0 780 480">
  <defs>
    <style>
      text { font-family: "Segoe UI", system-ui, -apple-system, sans-serif; }
      .title { font-size: 14px; font-weight: 600; fill: #1b1b1f; }
      .label { font-size: 12px; fill: #2C3E50; }
      .sub { font-size: 11px; fill: #555; }
      .detail { font-size: 10px; fill: #868e96; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>

  <!-- Early Layers (entangled) -->
  <rect x="30" y="45" width="200" height="150" rx="10" fill="#d0ebff" fill-opacity="0.3" stroke="#4C72B0" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="130" y="35" text-anchor="middle" class="title">Early Layers</text>
  <text x="130" y="67" text-anchor="middle" class="sub">Entangled (Reflex)</text>
  <circle cx="130" cy="125" r="48" fill="#4C72B0" fill-opacity="0.2" stroke="#4C72B0" stroke-width="2"/>
  <text x="130" y="121" text-anchor="middle" class="label">v_H + v_R</text>
  <text x="130" y="137" text-anchor="middle" class="detail">Knowing = Acting</text>

  <!-- Arrow: depth -->
  <line x1="240" y1="125" x2="290" y2="125" stroke="#8C8C8C" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="288,121 296,125 288,129" fill="#8C8C8C"/>
  <text x="265" y="115" text-anchor="middle" class="detail">depth</text>

  <!-- Deep Layers (decoupled) -->
  <rect x="300" y="45" width="240" height="150" rx="10" fill="#fff3bf" fill-opacity="0.3" stroke="#F5B041" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="420" y="35" text-anchor="middle" class="title">Deep Layers</text>
  <text x="420" y="67" text-anchor="middle" class="sub">Dissociated</text>
  <circle cx="370" cy="125" r="38" fill="#4C72B0" fill-opacity="0.15" stroke="#4C72B0" stroke-width="2"/>
  <text x="370" y="121" text-anchor="middle" class="label">v_H</text>
  <text x="370" y="137" text-anchor="middle" class="detail">Knowing</text>
  <circle cx="470" cy="125" r="38" fill="#C44E52" fill-opacity="0.15" stroke="#C44E52" stroke-width="2"/>
  <text x="470" y="121" text-anchor="middle" class="label">v_R</text>
  <text x="470" y="137" text-anchor="middle" class="detail">Acting</text>
  <line x1="420" y1="85" x2="420" y2="165" stroke="#8C8C8C" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="420" y="180" text-anchor="middle" class="detail">structurally separated</text>

  <!-- Arrow: REA -->
  <line x1="550" y1="125" x2="600" y2="125" stroke="#C44E52" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="598,121 606,125 598,129" fill="#C44E52"/>
  <text x="575" y="115" text-anchor="middle" class="detail" fill="#C44E52">REA</text>

  <!-- After REA -->
  <rect x="610" y="45" width="160" height="150" rx="10" fill="#ffccc7" fill-opacity="0.2" stroke="#C44E52" stroke-width="1.5"/>
  <text x="690" y="35" text-anchor="middle" class="title">After REA</text>
  <text x="690" y="67" text-anchor="middle" class="sub" fill="#C44E52">Knowing without Acting</text>
  <circle cx="690" cy="115" r="38" fill="#4C72B0" fill-opacity="0.15" stroke="#4C72B0" stroke-width="2"/>
  <text x="690" y="111" text-anchor="middle" class="label">v_H ✓</text>
  <text x="690" y="127" text-anchor="middle" class="detail">still knows</text>
  <circle cx="690" cy="115" r="38" fill="none" stroke="#C44E52" stroke-width="1" stroke-dasharray="3,3" opacity="0.3"/>
  <text x="690" y="170" text-anchor="middle" class="detail" fill="#C44E52">v_R removed (h − α·v_R)</text>
  <text x="690" y="185" text-anchor="middle" class="detail" fill="#C44E52">no refusal</text>

  <!-- Semantic Representation Decay -->
  <rect x="30" y="230" width="740" height="80" rx="8" fill="#f8f9fa" stroke="#BDC3C7" stroke-width="1"/>
  <text x="400" y="255" text-anchor="middle" class="title">Semantic Representation Decay (temporal)</text>
  <text x="400" y="275" text-anchor="middle" class="sub">Model generates "Sure, here is..." prefix</text>
  <text x="400" y="295" text-anchor="middle" class="detail">v_H harm signal overwritten by compliance style → model loses sight of harm</text>

  <!-- Architectural Divergence -->
  <rect x="30" y="330" width="740" height="120" rx="8" fill="#f8f9fa" stroke="#BDC3C7" stroke-width="1"/>
  <text x="400" y="355" text-anchor="middle" class="title">Architectural Divergence</text>
  <rect x="50" y="370" width="340" height="60" rx="5" fill="#d0ebff" fill-opacity="0.4" stroke="#4C72B0" stroke-width="1"/>
  <text x="220" y="395" text-anchor="middle" class="detail">Llama 3.1: Explicit Semantic Control</text>
  <text x="220" y="412" text-anchor="middle" class="detail">(v_R in identifiable attention heads)</text>
  <rect x="410" y="370" width="340" height="60" rx="5" fill="#d3f9d8" fill-opacity="0.4" stroke="#82E0AA" stroke-width="1"/>
  <text x="580" y="395" text-anchor="middle" class="detail">Qwen 2.5: Latent Distributed Control</text>
  <text x="580" y="412" text-anchor="middle" class="detail">(v_R spread across many components)</text>
</svg>
