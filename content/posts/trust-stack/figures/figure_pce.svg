<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="780" height="380" viewBox="0 0 780 380">
  <defs>
    <style>
      text { font-family: "Segoe UI", system-ui, -apple-system, sans-serif; }
      .title { font-size: 16px; font-weight: 600; fill: #1b1b1f; }
      .label { font-size: 13px; font-weight: 600; fill: #2C3E50; }
      .desc { font-size: 11px; fill: #555; }
      .detail { font-size: 10px; fill: #868e96; }
      .principle { font-size: 12px; fill: #C44E52; font-weight: 600; }
    </style>
    <marker id="arrow-flow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4C72B0"/>
    </marker>
    <marker id="arrow-block" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#C44E52"/>
    </marker>
    <marker id="arrow-allow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2b8a3e"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>

  <text x="390" y="25" text-anchor="middle" class="title">Proposal–Certification–Execution (PCE) Architecture</text>

  <!-- M_G: Generating Machine -->
  <rect x="40" y="60" width="200" height="80" rx="10" fill="#d0ebff" fill-opacity="0.3" stroke="#4C72B0" stroke-width="2"/>
  <text x="140" y="85" text-anchor="middle" class="label">M_G</text>
  <text x="140" y="103" text-anchor="middle" class="desc">Generating Machine</text>
  <text x="140" y="120" text-anchor="middle" class="detail">Proposes candidate traces</text>
  <text x="140" y="135" text-anchor="middle" class="detail">(steps, evidence, tool calls)</text>

  <!-- Arrow: propose -->
  <line x1="245" y1="100" x2="295" y2="100" stroke="#4C72B0" stroke-width="2" marker-end="url(#arrow-flow)"/>
  <text x="270" y="92" text-anchor="middle" class="detail">proposes</text>

  <!-- M_Π: Permissibility Machine -->
  <rect x="300" y="60" width="200" height="80" rx="10" fill="#fff3bf" fill-opacity="0.3" stroke="#F5B041" stroke-width="2"/>
  <text x="400" y="85" text-anchor="middle" class="label">M_Π</text>
  <text x="400" y="103" text-anchor="middle" class="desc">Permissibility Machine</text>
  <text x="400" y="120" text-anchor="middle" class="detail">Certifies under policy Π</text>
  <text x="400" y="135" text-anchor="middle" class="detail">(external, non-LLM verified)</text>

  <!-- Fork: certified vs rejected -->
  <!-- Certified path -->
  <line x1="505" y1="90" x2="555" y2="90" stroke="#2b8a3e" stroke-width="2" marker-end="url(#arrow-allow)"/>
  <text x="530" y="82" text-anchor="middle" class="detail" fill="#2b8a3e">certified</text>

  <!-- Rejected path -->
  <line x1="505" y1="115" x2="555" y2="115" stroke="#C44E52" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrow-block)"/>
  <text x="530" y="135" text-anchor="middle" class="detail" fill="#C44E52">rejected</text>

  <!-- Execution -->
  <rect x="560" y="60" width="180" height="60" rx="10" fill="#d3f9d8" fill-opacity="0.3" stroke="#82E0AA" stroke-width="2"/>
  <text x="650" y="83" text-anchor="middle" class="label">Execution</text>
  <text x="650" y="100" text-anchor="middle" class="detail">L_exec = L_G ∩ L_cert(M_Π)</text>
  <text x="650" y="113" text-anchor="middle" class="detail">only certified traces execute</text>

  <!-- Blocked -->
  <rect x="560" y="130" width="180" height="40" rx="10" fill="#ffccc7" fill-opacity="0.2" stroke="#C44E52" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="650" y="155" text-anchor="middle" class="detail" fill="#C44E52">Blocked — no certificate</text>

  <!-- Principle -->
  <rect x="40" y="200" width="700" height="50" rx="8" fill="#f8f9fa" stroke="#BDC3C7" stroke-width="1"/>
  <text x="390" y="225" text-anchor="middle" class="principle">"Generation is not permission"</text>
  <text x="390" y="240" text-anchor="middle" class="detail">An agent may propose an action, but execution occurs only after external certification under policy Π</text>

  <!-- Meta-problem -->
  <rect x="40" y="270" width="700" height="90" rx="8" fill="#fff3bf" fill-opacity="0.15" stroke="#BDC3C7" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="390" y="295" text-anchor="middle" class="label" fill="#C44E52">The Meta-Problem</text>
  <text x="390" y="315" text-anchor="middle" class="desc">M_Π is still an LLM in most implementations.</text>
  <text x="390" y="330" text-anchor="middle" class="desc">If the LLM's v_R is compromised, can we trust its certificates?</text>
  <text x="390" y="348" text-anchor="middle" class="detail">→ Recursive trust problem. Goodhart-Campbell Transition: agent may degrade the evaluation system itself.</text>
</svg>
