<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="780" height="430" viewBox="0 0 780 430">
<defs><style>text{font-family:"Helvetica Neue",Arial,sans-serif;fill:#2C3E50}.t{font-size:20px;font-weight:600}.h{font-size:13px;font-weight:600}.s{font-size:11px;fill:#66727d}</style><marker id="a" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#4C72B0"/></marker></defs>
<rect width="780" height="430" fill="#fff"/><text x="390" y="30" text-anchor="middle" class="t">Risk-to-response is a cascade, not a threshold alone</text>
<g>
<rect x="35" y="88" width="130" height="62" rx="10" fill="#dceaf7" stroke="#4C72B0"/><text x="100" y="113" text-anchor="middle" class="h">Internal sensor</text><text x="100" y="133" text-anchor="middle" class="s">cheap · early</text>
<rect x="205" y="88" width="130" height="62" rx="10" fill="#dceaf7" stroke="#4C72B0"/><text x="270" y="113" text-anchor="middle" class="h">Calibration</text><text x="270" y="133" text-anchor="middle" class="s">risk + uncertainty</text>
<rect x="375" y="88" width="130" height="62" rx="10" fill="#e7f5ec" stroke="#82B894"/><text x="440" y="113" text-anchor="middle" class="h">Strong observer</text><text x="440" y="133" text-anchor="middle" class="s">only when needed</text>
<rect x="545" y="88" width="190" height="62" rx="10" fill="#fff1d6" stroke="#F5B041"/><text x="640" y="113" text-anchor="middle" class="h">Capability policy</text><text x="640" y="133" text-anchor="middle" class="s">deterministic authority</text>
<line x1="165" y1="119" x2="205" y2="119" stroke="#4C72B0" stroke-width="2" marker-end="url(#a)"/><line x1="335" y1="119" x2="375" y2="119" stroke="#4C72B0" stroke-width="2" marker-end="url(#a)"/><line x1="505" y1="119" x2="545" y2="119" stroke="#4C72B0" stroke-width="2" marker-end="url(#a)"/>
</g>
<text x="390" y="205" text-anchor="middle" class="h">Response ladder</text>
<g><rect x="45" y="232" width="112" height="48" rx="8" fill="#f3f6f8" stroke="#BDC3C7"/><text x="101" y="261" text-anchor="middle" class="h">Observe</text><rect x="189" y="232" width="112" height="48" rx="8" fill="#dceaf7" stroke="#4C72B0"/><text x="245" y="261" text-anchor="middle" class="h">Replan</text><rect x="333" y="232" width="112" height="48" rx="8" fill="#e7f5ec" stroke="#82B894"/><text x="389" y="261" text-anchor="middle" class="h">Restrict</text><rect x="477" y="232" width="112" height="48" rx="8" fill="#fff1d6" stroke="#F5B041"/><text x="533" y="261" text-anchor="middle" class="h">Confirm</text><rect x="621" y="232" width="112" height="48" rx="8" fill="#f8dddd" stroke="#C44E52"/><text x="677" y="261" text-anchor="middle" class="h">Block</text></g>
<rect x="100" y="330" width="580" height="56" rx="10" fill="#fff1d6" stroke="#F5B041"/><text x="390" y="354" text-anchor="middle" class="h">Fail-closed invariant</text><text x="390" y="375" text-anchor="middle" class="s">Monitor failure never expands authority; effectful actions retain boundary checks.</text>
</svg>
