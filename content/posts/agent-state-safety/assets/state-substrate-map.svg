<rect x="28" y="143" width="724" height="42" rx="8" fill="#dceaf7"/><text x="45" y="169" class="h">Generated tokens</text><text x="300" y="169" class="s">generation → history</text><text x="560" y="169" class="s">parser / plan validation</text>
