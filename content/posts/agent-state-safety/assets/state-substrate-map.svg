<rect x="28" y="245" width="724" height="42" rx="8" fill="#e7f5ec"/><text x="45" y="271" class="h">Serialized context</text><text x="300" y="271" class="s">task / session</text><text x="560" y="271" class="s">provenance / context builder</text>
