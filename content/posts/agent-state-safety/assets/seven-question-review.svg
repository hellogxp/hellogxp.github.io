<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="780" height="420" viewBox="0 0 780 420">
  <defs>
    <style>
      text { font-family: "Helvetica Neue", Arial, sans-serif; fill: #2C3E50; }
      .title { font-size: 20px; font-weight: 600; }
      .name { font-size: 14px; font-weight: 600; }
      .desc { font-size: 11px; fill: #5f6b76; }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#4C72B0"/>
    </marker>
  </defs>
  <rect width="780" height="420" fill="#fff"/>
  <text x="390" y="30" text-anchor="middle" class="title">Seven Questions for Internal Agent Monitors</text>

  <g stroke="#BDC3C7">
    <rect x="30" y="70" width="128" height="72" rx="10" fill="#dceaf7"/>
    <rect x="178" y="70" width="128" height="72" rx="10" fill="#dceaf7"/>
    <rect x="326" y="70" width="128" height="72" rx="10" fill="#dceaf7"/>
    <rect x="474" y="70" width="128" height="72" rx="10" fill="#dceaf7"/>
    <rect x="622" y="70" width="128" height="72" rx="10" fill="#dceaf7"/>
  </g>
  <text x="94" y="99" text-anchor="middle" class="name">1 · Target</text><text x="94" y="121" text-anchor="middle" class="desc">What is detected?</text>
  <text x="242" y="99" text-anchor="middle" class="name">2 · Timing</text><text x="242" y="121" text-anchor="middle" class="desc">When available?</text>
  <text x="390" y="99" text-anchor="middle" class="name">3 · Owner</text><text x="390" y="121" text-anchor="middle" class="desc">Whose state?</text>
  <text x="538" y="99" text-anchor="middle" class="name">4 · Comparator</text><text x="538" y="121" text-anchor="middle" class="desc">What must it beat?</text>
  <text x="686" y="99" text-anchor="middle" class="name">5 · Support</text><text x="686" y="121" text-anchor="middle" class="desc">Where does it hold?</text>
  <line x1="158" y1="106" x2="178" y2="106" stroke="#4C72B0" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="306" y1="106" x2="326" y2="106" stroke="#4C72B0" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="454" y1="106" x2="474" y2="106" stroke="#4C72B0" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="602" y1="106" x2="622" y2="106" stroke="#4C72B0" stroke-width="2" marker-end="url(#arrow)"/>

  <text x="390" y="184" text-anchor="middle" class="desc">Evidence validity</text>
  <line x1="95" y1="158" x2="685" y2="158" stroke="#95A5A6" stroke-dasharray="6,4"/>

  <rect x="170" y="220" width="190" height="80" rx="10" fill="#fff1d6" stroke="#F5B041"/>
  <rect x="420" y="220" width="190" height="80" rx="10" fill="#fff1d6" stroke="#F5B041"/>
  <text x="265" y="250" text-anchor="middle" class="name">6 · Threat</text><text x="265" y="274" text-anchor="middle" class="desc">Which adversary tier?</text>
  <text x="515" y="250" text-anchor="middle" class="name">7 · Response</text><text x="515" y="274" text-anchor="middle" class="desc">What can still be done?</text>
  <line x1="360" y1="260" x2="420" y2="260" stroke="#4C72B0" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="390" y="336" text-anchor="middle" class="desc">Deployment value</text>

  <rect x="120" y="360" width="540" height="38" rx="9" fill="#e7f5ec" stroke="#82B894"/>
  <text x="390" y="384" text-anchor="middle" class="name">Evidence may restrict authority; it must never grant authority alone.</text>
</svg>
