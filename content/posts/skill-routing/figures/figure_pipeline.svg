<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="780" height="420" viewBox="0 0 780 420">
  <defs>
    <style>
      text { font-family: "Segoe UI", system-ui, -apple-system, sans-serif; }
      .title { font-size: 14px; font-weight: 600; fill: #1b1b1f; }
      .stage { font-size: 13px; font-weight: 600; fill: #1b1b1f; }
      .sub { font-size: 11px; fill: #555; }
      .detail { font-size: 10px; fill: #868e96; }
      .label { font-size: 10px; fill: #868e96; font-style: italic; }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4C72B0"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#C44E52"/>
    </marker>
    <marker id="arrow-gray" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#8C8C8C"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>

  <!-- Query box -->
  <rect x="180" y="10" width="420" height="32" rx="6" fill="#FEF9E7" stroke="#BDC3C7" stroke-width="1"/>
  <text x="390" y="30" text-anchor="middle" class="sub" fill="#2C3E50" font-style="italic">"Download the dataset, transform it, and create visual reports"</text>

  <!-- Arrow to Stage 1 -->
  <line x1="390" y1="42" x2="390" y2="60" stroke="#4C72B0" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stage 1: Decompose -->
  <rect x="270" y="62" width="240" height="36" rx="6" fill="#d0ebff" fill-opacity="0.5" stroke="#4C72B0" stroke-width="1.5"/>
  <text x="390" y="84" text-anchor="middle" class="stage">Stage 1: Decompose (LLM)</text>

  <!-- Arrows to sub-tasks -->
  <line x1="390" y1="98" x2="200" y2="120" stroke="#8C8C8C" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
  <line x1="390" y1="98" x2="390" y2="120" stroke="#8C8C8C" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
  <line x1="390" y1="98" x2="580" y2="120" stroke="#8C8C8C" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <!-- Sub-tasks -->
  <rect x="130" y="122" width="140" height="28" rx="5" fill="#d3f9d8" fill-opacity="0.5" stroke="#82E0AA" stroke-width="1"/>
  <text x="200" y="140" text-anchor="middle" class="detail">t₁: Download dataset</text>
  <rect x="320" y="122" width="140" height="28" rx="5" fill="#d3f9d8" fill-opacity="0.5" stroke="#82E0AA" stroke-width="1"/>
  <text x="390" y="140" text-anchor="middle" class="detail">t₂: Transform data</text>
  <rect x="510" y="122" width="140" height="28" rx="5" fill="#d3f9d8" fill-opacity="0.5" stroke="#82E0AA" stroke-width="1"/>
  <text x="580" y="140" text-anchor="middle" class="detail">t₃: Create reports</text>

  <!-- Arrows to Stage 2 -->
  <line x1="200" y1="150" x2="390" y2="172" stroke="#8C8C8C" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
  <line x1="390" y1="150" x2="390" y2="172" stroke="#8C8C8C" stroke-width="1.5"/>
  <line x1="580" y1="150" x2="390" y2="172" stroke="#8C8C8C" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <!-- Stage 2: Retrieve -->
  <rect x="250" y="174" width="280" height="36" rx="6" fill="#d0ebff" fill-opacity="0.5" stroke="#4C72B0" stroke-width="1.5"/>
  <text x="390" y="196" text-anchor="middle" class="stage">Stage 2: Retrieve (Bi-Enc + FAISS)</text>

  <!-- Skill Library (left) -->
  <rect x="40" y="176" width="100" height="32" rx="5" fill="#f8f9fa" stroke="#BDC3C7" stroke-width="1"/>
  <text x="90" y="196" text-anchor="middle" class="detail">Skill Library</text>
  <text x="90" y="206" text-anchor="middle" class="detail">(N = 2,209)</text>
  <line x1="140" y1="192" x2="250" y2="192" stroke="#8C8C8C" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow-gray)"/>

  <!-- Arrows to skills -->
  <line x1="390" y1="210" x2="200" y2="232" stroke="#8C8C8C" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
  <line x1="390" y1="210" x2="390" y2="232" stroke="#8C8C8C" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
  <line x1="390" y1="210" x2="580" y2="232" stroke="#8C8C8C" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <!-- Skills -->
  <rect x="120" y="234" width="160" height="28" rx="5" fill="#e7d6f7" fill-opacity="0.4" stroke="#B39DDB" stroke-width="1"/>
  <text x="200" y="252" text-anchor="middle" class="detail">api-client, http-fetch…</text>
  <rect x="310" y="234" width="160" height="28" rx="5" fill="#e7d6f7" fill-opacity="0.4" stroke="#B39DDB" stroke-width="1"/>
  <text x="390" y="252" text-anchor="middle" class="detail">csv-parser, etl-pipeline…</text>
  <rect x="500" y="234" width="160" height="28" rx="5" fill="#e7d6f7" fill-opacity="0.4" stroke="#B39DDB" stroke-width="1"/>
  <text x="580" y="252" text-anchor="middle" class="detail">chart-gen, dashboard…</text>

  <!-- top-k labels -->
  <text x="200" y="228" text-anchor="middle" class="label">top-k</text>
  <text x="390" y="228" text-anchor="middle" class="label">top-k</text>
  <text x="580" y="228" text-anchor="middle" class="label">top-k</text>

  <!-- Arrow to Stage 3 -->
  <line x1="390" y1="262" x2="390" y2="284" stroke="#8C8C8C" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <!-- Stage 3: Compose -->
  <rect x="260" y="286" width="260" height="36" rx="6" fill="#d0ebff" fill-opacity="0.5" stroke="#4C72B0" stroke-width="1.5"/>
  <text x="390" y="308" text-anchor="middle" class="stage">Stage 3: Compose (DAG)</text>

  <!-- Arrows to DAG nodes -->
  <line x1="390" y1="322" x2="250" y2="344" stroke="#8C8C8C" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
  <line x1="390" y1="322" x2="390" y2="344" stroke="#8C8C8C" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
  <line x1="390" y1="322" x2="530" y2="344" stroke="#8C8C8C" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <!-- DAG nodes -->
  <rect x="190" y="346" width="120" height="28" rx="5" fill="#ffccc7" fill-opacity="0.4" stroke="#C44E52" stroke-width="1"/>
  <text x="250" y="364" text-anchor="middle" class="detail">s₁: api-client</text>
  <rect x="330" y="346" width="120" height="28" rx="5" fill="#ffccc7" fill-opacity="0.4" stroke="#C44E52" stroke-width="1"/>
  <text x="390" y="364" text-anchor="middle" class="detail">s₂: csv-parser</text>
  <rect x="470" y="346" width="120" height="28" rx="5" fill="#ffccc7" fill-opacity="0.4" stroke="#C44E52" stroke-width="1"/>
  <text x="530" y="364" text-anchor="middle" class="detail">s₃: chart-gen</text>

  <!-- DAG edges -->
  <line x1="310" y1="360" x2="330" y2="360" stroke="#C44E52" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <line x1="450" y1="360" x2="470" y2="360" stroke="#C44E52" stroke-width="2" marker-end="url(#arrow-orange)"/>

  <!-- SAD feedback loop -->
  <rect x="640" y="70" width="100" height="40" rx="6" fill="#fff3bf" fill-opacity="0.6" stroke="#F5B041" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="690" y="88" text-anchor="middle" class="stage" font-size="11px">SAD</text>
  <text x="690" y="102" text-anchor="middle" class="detail">skill hints</text>

  <!-- Feedback arrow: Stage 2 → SAD -->
  <path d="M 530 192 L 600 192 L 600 90 L 640 90" fill="none" stroke="#C44E52" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-orange)"/>
  <text x="610" y="145" class="label" fill="#C44E52">hints</text>

  <!-- Feedback arrow: SAD → Stage 1 -->
  <path d="M 640 90 L 600 90 L 600 80 L 510 80" fill="none" stroke="#C44E52" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-orange)"/>

  <!-- Bottom labels -->
  <text x="390" y="400" text-anchor="middle" class="label">Dashed arrows: SAD feedback loop — skill hints fed back into decomposition</text>
</svg>
